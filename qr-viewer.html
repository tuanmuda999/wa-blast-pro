<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp QR Code</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        .container {
            background: white;
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 70px rgba(0,0,0,0.4);
            max-width: 550px;
            width: 90%;
        }
        
        h1 {
            color: #25D366;
            font-size: 32px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 35px;
            font-size: 16px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #25D366;
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.1);
        }
        
        button {
            background: linear-gradient(135deg, #25D366 0%, #128c7e 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #qr-container {
            margin-top: 35px;
            min-height: 200px;
        }
        
        .qr-box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.15);
        }
        
        img {
            max-width: 350px;
            width: 100%;
            border-radius: 12px;
            display: block;
        }
        
        .instructions {
            background: #f7fafc;
            padding: 25px;
            border-radius: 16px;
            margin: 30px 0;
            text-align: left;
        }
        
        .instructions h3 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .instructions ol {
            margin-left: 25px;
            color: #4a5568;
            line-height: 2;
            font-size: 15px;
        }
        
        .instructions li {
            margin-bottom: 8px;
        }
        
        .instructions strong {
            color: #25D366;
        }
        
        .loading {
            font-size: 64px;
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        
        .error {
            color: #e53e3e;
            padding: 25px;
            background: #fff5f5;
            border-radius: 12px;
            border-left: 4px solid #e53e3e;
        }
        
        .success {
            color: #25D366;
            padding: 25px;
            background: #f0fdf4;
            border-radius: 12px;
            border-left: 4px solid #25D366;
        }
        
        .info {
            margin-top: 25px;
            padding: 20px;
            background: #edf2f7;
            border-radius: 12px;
            font-size: 14px;
            color: #4a5568;
        }
        
        .warning {
            color: #e53e3e;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 15px;
        }
        
        .status.ready {
            background: #c6f6d5;
            color: #22543d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>📱</span>
            WhatsApp QR Scanner
        </h1>
        <p class="subtitle">Connect your phone in seconds</p>
        
        <div class="instructions">
            <h3>📋 How to Connect:</h3>
            <ol>
                <li>Open <strong>WhatsApp</strong> on your phone</li>
                <li>Go to <strong>Settings → Linked Devices</strong></li>
                <li>Tap <strong>"Link a Device"</strong></li>
                <li>Point your camera at the QR code below</li>
            </ol>
        </div>
        
        <div class="input-group">
            <input 
                type="text" 
                id="sessionId" 
                placeholder="Enter session ID" 
                value="clean-session"
            >
        </div>
        
        <button onclick="loadQR()">
            🔍 Load QR Code
        </button>
        
        <div id="qr-container"></div>
    </div>
    
    <script>
        let autoRefreshTimer = null;
        
        async function loadQR() {
            const sessionId = document.getElementById('sessionId').value.trim();
            const container = document.getElementById('qr-container');
            
            if (!sessionId) {
                container.innerHTML = '<div class="error">⚠️ Please enter a session ID</div>';
                return;
            }
            
            container.innerHTML = '<div class="loading">⏳</div>';
            
            // Clear any existing refresh timer
            if (autoRefreshTimer) {
                clearTimeout(autoRefreshTimer);
            }
            
            try {
                const response = await fetch(`http://localhost:3000/api/session/qr/${sessionId}`);
                const data = await response.json();
                
                if (data.error) {
                    container.innerHTML = `
                        <div class="error">
                            <strong>❌ ${data.error}</strong><br><br>
                            <small>Make sure the session exists and QR code is ready.<br>
                            Wait a few seconds and try again.</small>
                        </div>
                    `;
                    return;
                }
                
                if (data.qrImage) {
                    container.innerHTML = `
                        <div class="success" style="margin-bottom: 25px;">
                            ✅ QR Code Ready!
                        </div>
                        <div class="qr-box">
                            <img src="${data.qrImage}" alt="WhatsApp QR Code">
                        </div>
                        <div class="info">
                            <strong>Session:</strong> ${sessionId}<br>
                            <span class="warning">⚠️ QR code expires in 60 seconds</span><br>
                            <span class="status ready">Auto-refreshing every 50 seconds</span>
                        </div>
                    `;
                    
                    // Auto-refresh before expiry (50 seconds)
                    autoRefreshTimer = setTimeout(() => {
                        console.log('Auto-refreshing QR code...');
                        loadQR();
                    }, 50000);
                    
                    // Also check connection status
                    checkConnection(sessionId);
                } else {
                    container.innerHTML = `
                        <div class="error">
                            <strong>⚠️ QR Code Not Available</strong><br><br>
                            <small>The QR code is still being generated.<br>
                            Please wait a moment and click "Load QR Code" again.</small>
                        </div>
                    `;
                }
            } catch (err) {
                container.innerHTML = `
                    <div class="error">
                        <strong>❌ Connection Error</strong><br><br>
                        ${err.message}<br><br>
                        <small>Make sure the backend server is running on localhost:3000</small>
                    </div>
                `;
            }
        }
        
        async function checkConnection(sessionId) {
            try {
                const response = await fetch(`http://localhost:3000/api/session/status/${sessionId}`);
                const data = await response.json();
                
                if (data.connected) {
                    // Clear refresh timer
                    if (autoRefreshTimer) {
                        clearTimeout(autoRefreshTimer);
                    }
                    
                    // Show success
                    document.getElementById('qr-container').innerHTML = `
                        <div class="success">
                            <h2 style="margin-bottom: 15px;">🎉 Connected Successfully!</h2>
                            <p>Your WhatsApp session "<strong>${sessionId}</strong>" is now connected and ready to use!</p>
                            <p style="margin-top: 20px; font-size: 14px;">
                                You can now close this window and start sending messages.
                            </p>
                        </div>
                    `;
                } else {
                    // Check again in 2 seconds
                    setTimeout(() => checkConnection(sessionId), 2000);
                }
            } catch (err) {
                console.error('Status check error:', err);
            }
        }
        
        // Auto-load on page open
        window.onload = () => {
            const sessionId = document.getElementById('sessionId').value;
            if (sessionId) {
                loadQR();
            }
        };
        
        // Allow Enter key to load QR
        document.getElementById('sessionId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadQR();
            }
        });
    </script>
</body>
</html>
